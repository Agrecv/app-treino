<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App de Treino da Esposa</title>
    
    <!-- Carrega o Tailwind CSS para o design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Carrega o React e o ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Carrega o Babel para traduzir o código React (JSX) no próprio navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Ocultar barra de rolagem horizontal mantendo a funcionalidade */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // Ícones em formato SVG (Substituindo o lucide-react para funcionar offline/localmente)
        const CheckCircle2 = ({ size, className }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
        );
        const Circle = ({ size, className }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/></svg>
        );
        const Edit2 = ({ size, className }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
        );
        const Save = ({ size, className }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        );
        const Dumbbell = ({ size, className }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.4 14.4 9.6 9.6"/><path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"/><path d="m21.5 21.5-1.4-1.4"/><path d="M3.9 3.9 2.5 2.5"/><path d="M6.404 2.757a2 2 0 1 0-2.829 2.828l1.768-1.767a2 2 0 1 0 2.829 2.828L1.808 13.01a2 2 0 1 0-2.829-2.829l1.767-1.768a2 2 0 1 0 2.829-2.829z"/></svg>
        );
        const CalendarIcon = ({ size, className }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        );

        const INITIAL_EXERCISES = [
          // Dia 1
          { id: '1-1', dayId: 1, name: 'Levantamento Terra Romeno (RDL) ou Stiff', sets: '4x 8-12', completed: false },
          { id: '1-2', dayId: 1, name: 'Elevação Pélvica (Hip Thrust)', sets: '4x 10-15', completed: false },
          { id: '1-3', dayId: 1, name: 'Cadeira/Mesa Flexora', sets: '3x 12-15', completed: false },
          { id: '1-4', dayId: 1, name: 'Cadeira Abdutora', sets: '3x 15', completed: false },
          { id: '1-5', dayId: 1, name: 'Elevação de Calcanhares em Pé', sets: '4x 15-20', completed: false },
          // Dia 2
          { id: '2-1', dayId: 2, name: 'Agachamento Livre ou no Smith', sets: '4x 8-12', completed: false },
          { id: '2-2', dayId: 2, name: 'Leg Press 45º', sets: '4x 10-12', completed: false },
          { id: '2-3', dayId: 2, name: 'Afundo ou Passada', sets: '3x 10-12', completed: false },
          { id: '2-4', dayId: 2, name: 'Cadeira Extensora', sets: '3x 12-15', completed: false },
          { id: '2-5', dayId: 2, name: 'Prancha Abdominal', sets: '3x Máx', completed: false },
          { id: '2-6', dayId: 2, name: 'Abdominal Supra (Crunch)', sets: '3x 15-20', completed: false },
          // Dia 3
          { id: '3-1', dayId: 3, name: 'Remada Curvada', sets: '3x 12', completed: false },
          { id: '3-2', dayId: 3, name: 'Tríceps no Banco (Mergulho)', sets: '3x 10-15', completed: false },
          { id: '3-3', dayId: 3, name: 'Desenvolvimento para Ombros', sets: '3x 12', completed: false },
          { id: '3-4', dayId: 3, name: 'Flexão de Braços', sets: '3x Máx', completed: false },
          { id: '3-5', dayId: 3, name: 'Rosca Direta', sets: '3x 12-15', completed: false },
          { id: '3-6', dayId: 3, name: 'Elevação Lateral', sets: '3x 15', completed: false },
        ];

        const DAYS = [
          { id: 1, title: 'Dia 1', subtitle: 'Posterior & Glúteo' },
          { id: 2, title: 'Dia 2', subtitle: 'Quadríceps & Core' },
          { id: 3, title: 'Dia 3', subtitle: 'Superiores' },
        ];

        function App() {
          const [exercises, setExercises] = useState(INITIAL_EXERCISES);
          const [activeDay, setActiveDay] = useState(1);
          const [editingId, setEditingId] = useState(null);
          const [editValue, setEditValue] = useState('');

          const currentExercises = useMemo(() => {
            return exercises.filter(ex => ex.dayId === activeDay);
          }, [exercises, activeDay]);

          const progress = useMemo(() => {
            const completed = currentExercises.filter(ex => ex.completed).length;
            const total = currentExercises.length;
            return total === 0 ? 0 : Math.round((completed / total) * 100);
          }, [currentExercises]);

          const toggleComplete = (id) => {
            setExercises(prev => prev.map(ex => 
              ex.id === id ? { ...ex, completed: !ex.completed } : ex
            ));
          };

          const startEdit = (exercise) => {
            setEditingId(exercise.id);
            setEditValue(exercise.name);
          };

          const saveEdit = (id) => {
            if (editValue.trim() === '') return;
            setExercises(prev => prev.map(ex => 
              ex.id === id ? { ...ex, name: editValue } : ex
            ));
            setEditingId(null);
          };

          const handleKeyDown = (e, id) => {
            if (e.key === 'Enter') {
              saveEdit(id);
            }
          };

          const resetProgress = () => {
            if (window.confirm('Tem a certeza que deseja repor o progresso de hoje?')) {
              setExercises(prev => prev.map(ex => 
                ex.dayId === activeDay ? { ...ex, completed: false } : ex
              ));
            }
          };

          return (
            <div className="min-h-screen font-sans flex justify-center bg-slate-200 sm:p-4">
              <div className="w-full max-w-md bg-white sm:rounded-[2rem] sm:shadow-2xl flex flex-col h-[100dvh] sm:h-[850px] overflow-hidden relative">
                
                {/* Header */}
                <header className="bg-indigo-600 text-white p-6 pb-4 sm:rounded-t-[2rem] rounded-b-3xl shadow-md z-10 relative">
                  <div className="flex items-center gap-3 mb-4">
                    <div className="bg-white/20 p-2 rounded-xl">
                      <Dumbbell size={24} className="text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold leading-tight">Treino da Esposa</h1>
                      <p className="text-indigo-200 text-sm">Foco em Pernas & Glúteos</p>
                    </div>
                  </div>

                  {/* Progresso do Dia */}
                  <div className="mt-4">
                    <div className="flex justify-between items-end mb-2">
                      <span className="text-sm font-medium text-indigo-100">Progresso de hoje</span>
                      <span className="text-lg font-bold">{progress}%</span>
                    </div>
                    <div className="h-2 w-full bg-indigo-900/40 rounded-full overflow-hidden">
                      <div 
                        className="h-full bg-green-400 rounded-full transition-all duration-500 ease-out"
                        style={{ width: `${progress}%` }}
                      ></div>
                    </div>
                  </div>
                </header>

                {/* Abas dos Dias */}
                <div className="flex px-4 py-4 gap-2 overflow-x-auto hide-scrollbar bg-slate-50 border-b border-slate-200 shrink-0">
                  {DAYS.map(day => (
                    <button
                      key={day.id}
                      onClick={() => setActiveDay(day.id)}
                      className={`flex-1 min-w-[100px] flex flex-col items-center justify-center p-3 rounded-2xl transition-all duration-200 ${
                        activeDay === day.id 
                          ? 'bg-indigo-600 text-white shadow-md transform scale-105' 
                          : 'bg-white text-slate-500 shadow-sm hover:bg-slate-100'
                      }`}
                    >
                      <CalendarIcon size={18} className={`mb-1 ${activeDay === day.id ? 'text-indigo-200' : 'text-slate-400'}`} />
                      <span className="font-bold text-sm">{day.title}</span>
                      <span className={`text-[10px] leading-tight mt-0.5 text-center ${activeDay === day.id ? 'text-indigo-100' : 'text-slate-400'}`}>
                        {day.subtitle}
                      </span>
                    </button>
                  ))}
                </div>

                {/* Lista de Exercícios */}
                <div className="flex-1 overflow-y-auto p-4 bg-slate-50">
                  <div className="space-y-3">
                    {currentExercises.map((exercise) => (
                      <div 
                        key={exercise.id} 
                        className={`bg-white rounded-2xl p-4 shadow-sm border transition-all duration-200 ${
                          exercise.completed ? 'border-green-200 bg-green-50/50' : 'border-slate-100'
                        }`}
                      >
                        <div className="flex items-start gap-4">
                          <button 
                            onClick={() => toggleComplete(exercise.id)}
                            className="mt-1 shrink-0 focus:outline-none transition-transform active:scale-90"
                          >
                            {exercise.completed ? (
                              <CheckCircle2 size={28} className="text-green-500" />
                            ) : (
                              <Circle size={28} className="text-slate-300 hover:text-indigo-400" />
                            )}
                          </button>

                          <div className="flex-1 min-w-0">
                            {editingId === exercise.id ? (
                              <div className="flex items-center gap-2">
                                <input
                                  type="text"
                                  value={editValue}
                                  onChange={(e) => setEditValue(e.target.value)}
                                  onKeyDown={(e) => handleKeyDown(e, exercise.id)}
                                  className="w-full bg-slate-100 border border-indigo-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                  autoFocus
                                />
                                <button 
                                  onClick={() => saveEdit(exercise.id)}
                                  className="p-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shrink-0"
                                >
                                  <Save size={16} />
                                </button>
                              </div>
                            ) : (
                              <div className="flex justify-between items-start gap-2">
                                <div onClick={() => toggleComplete(exercise.id)} className="cursor-pointer">
                                  <h3 className={`font-semibold text-base leading-snug transition-colors ${
                                    exercise.completed ? 'text-slate-400 line-through' : 'text-slate-800'
                                  }`}>
                                    {exercise.name}
                                  </h3>
                                  <span className={`text-xs font-medium inline-block mt-1 px-2 py-1 rounded-md ${
                                    exercise.completed ? 'bg-slate-200 text-slate-500' : 'bg-indigo-100 text-indigo-700'
                                  }`}>
                                    {exercise.sets}
                                  </span>
                                </div>
                                <button 
                                  onClick={() => startEdit(exercise)}
                                  className="p-2 text-slate-400 hover:text-indigo-600 rounded-lg hover:bg-slate-100 shrink-0 transition-colors"
                                >
                                  <Edit2 size={16} />
                                </button>
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>

                  {progress === 100 && (
                    <div className="mt-8 p-4 bg-green-100 rounded-2xl border border-green-200 text-center">
                      <p className="text-green-800 font-bold flex items-center justify-center gap-2">
                        <CheckCircle2 size={20} className="text-green-600" />
                        Treino concluído! Bom trabalho!
                      </p>
                    </div>
                  )}
                </div>

                {/* Rodapé Fixo */}
                <div className="bg-white border-t border-slate-200 p-4 shrink-0 sm:rounded-b-[2rem]">
                   <button 
                      onClick={resetProgress}
                      className="w-full py-3 bg-slate-100 text-slate-600 font-semibold rounded-xl hover:bg-slate-200 transition-colors text-sm"
                    >
                      Repor treino de {DAYS.find(d => d.id === activeDay)?.title}
                    </button>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
